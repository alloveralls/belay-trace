name: pr-title

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  validate:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title against Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          regex='^(feat|fix|refactor|docs|test|chore|perf|ci)(\([^)]+\))?(!)?: .+$'

          if [[ ! "$PR_TITLE" =~ $regex ]]; then
            echo "Invalid PR title: $PR_TITLE"
            echo "Expected format: <type>(optional-scope)!: description"
            echo "Allowed types: feat, fix, refactor, docs, test, chore, perf, ci"
            exit 1
          fi
